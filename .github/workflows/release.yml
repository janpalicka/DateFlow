name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest

    outputs:
      channel: ${{ steps.release.outputs.channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release channel
        id: release
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=production" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(jq -r .version package.json)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --tag ${{ steps.release.outputs.npm_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ steps.release.outputs.prerelease == 'true' }}

  deploy-docs:
    name: Deploy docs
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run pages.yml --ref main \
            -f tag="${{ github.ref_name }}" \
            -f channel="${{ needs.publish.outputs.channel }}"
